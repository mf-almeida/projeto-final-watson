<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emotion Detection</title>
    <script>
        function RunEmotionDetection() {
            let textToAnalyze = document.getElementById("textToAnalyze").value;
            let xhttp = new XMLHttpRequest();
            xhttp.onreadystatechange = function() {
                if (this.readyState == 4 && this.status == 200) {
                    document.getElementById("system_response").innerHTML = xhttp.responseText;
                }
            };
            xhttp.open("GET", "/emotionDetector?textToAnalyze=" + encodeURIComponent(textToAnalyze), true);
            xhttp.send();
        }
    </script>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px;">
    <h2>Emotion Detection System</h2>
    <textarea id="textToAnalyze" rows="4" cols="50" placeholder="Enter text here..."></textarea><br><br>
    <button onclick="RunEmotionDetection()">Analyze</button>
    <p id="system_response" style="margin-top: 20px; font-weight: bold;"></p>
</body>
</html>
